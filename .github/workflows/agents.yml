name: Business IA - Rapport Automatique
 
on:
  schedule:
    - cron: '0 8 * * *'  # Chaque jour à 8h UTC
  workflow_dispatch:       # Lancement manuel possible
 
jobs:
  run-agents:
    runs-on: ubuntu-latest
 
    steps:
      - name: Checkout du repo
        uses: actions/checkout@v3
 
      - name: Setup Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
 
      - name: Installation des dépendances
        run: |
          pip install crewai groq supabase secure-smtplib
 
      - name: Lancement des agents IA
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
        run: |
          python business_agents_groq.py
